<!DOCTYPE html>
<html>
<head>
    <title>🍞 대전 빵지순례 ESG 지도</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/3.2.0/lodash.js"></script>
    <script src="https://kit.fontawesome.com/8de5e44495.js" crossorigin="anonymous"></script>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=746c1d1e2ca21f2adcc051e3b28faeb8"></script>
    <script src="js/common.js"></script>
    <script src="js/map_utils.js"></script>
    <script src="js/bakery_map.js"></script>
</head>

<body>
    <div class="map_logo">
        <a href="index.html">
            <img src="img/main_logo.png">
        </a>
    </div>
    <div class="main_cont">

        <div id="map" style="width: 100%; height: 100vh;"></div>

        <div class="bottom_btn">
            <div class="btn_row">
                <button class="btn_main" onclick="goBakeryList()">
                    <i class="fa-solid fa-bread-slice"></i> 주변 빵집 찾기
                </button>
                <button class="btn_main" onclick="goAiCourse()">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> AI 빵집 코스
                </button>
            </div>
        </div>
    </div>

    <script>
        var map = createMap("map", 36.3504, 127.3845, 5);
        addZoomControl(map);
        showCurrentLocation(map, { showInfoWindow: false });
    </script>
</body>
</html>
