<!DOCTYPE html>
<html>
    <head>
        <title>AI 코스 추천</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <link rel="stylesheet" href="css/style.css">
        <script src="https://kit.fontawesome.com/8de5e44495.js" crossorigin="anonymous"></script>
        <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=746c1d1e2ca21f2adcc051e3b28faeb8"></script>
        <script src="js/map.js"></script>
        <script src="js/bakery_data.js"></script>
        <script src="js/common.js"></script>
        <script src="js/bakery_storage.js"></script>
        <script src="js/map_utils.js"></script>
        <script src="js/bakery_detail.js"></script>
    </head>
    <body>

        <div class="cont2_container">

            <div class="cont2_hd">
                <div class="logo"><a href="index.html"><img src="../img/main_logo.png"></a></div>
                <div class="title_t">
                    <strong>AI 추천 빵집 코스</strong>
                    <span>원하는 조건에 맞춰 AI가 맞춤 코스를 추천합니다!</span>
                </div>
            </div>
            
            <div class="cate_list">
                <div class="cate_li_title">이동수단을 선택해주세요</div>

                <div class="bottom">
                    <button class="btn" onclick="selectTransport('bus')"><img src="img/bus_icon.png" class="bus_icon"><span>대중교통</span></button>
                    <button class="btn" onclick="selectTransport('car')"><img src="img/car_icon.png" class="car_icon"><span>자가용</span></button>
                    <button class="btn secondary" onclick="history.back()">이전으로 돌아가기</button>
                </div>
            </div>
<script>
function selectTransport(type) {
    localStorage.setItem("transport", type);
    location.href = "cont2_2.html";
}
</script>
        </div>
    </body>
</html>
