<!DOCTYPE html>
<html>
    <head>
        <title>AI 코스 추천</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <link rel="stylesheet" href="css/style.css">
        <script src="https://kit.fontawesome.com/8de5e44495.js" crossorigin="anonymous"></script>
        <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=746c1d1e2ca21f2adcc051e3b28faeb8"></script>
        <script src="js/map.js"></script>
        <script src="js/bakery_data.js"></script>
        <script src="js/common.js"></script>
        <script src="js/bakery_storage.js"></script>
        <script src="js/map_utils.js"></script>
        <script src="js/bakery_detail.js"></script>
    </head>
    <body>

        <div class="cont2_container">

            <div class="cont2_hd">
                <div class="logo"><a href="index.html"><img src="../img/main_logo.png"></a></div>
                <div class="title_t">
                    <strong>AI 추천 빵집 코스</strong>
                    <span>원하는 조건에 맞춰 AI가 맞춤 코스를 추천합니다!</span>
                </div>
            </div>

            <div class="cate_list">
                <div class="cate_li_title">원하는 카테고리를 모두 선택해주세요</div>
                <div class="grid">
                    <!--ud-->
                    <li><div class="item" data-key="parking">주차장</div></li>
                    <li><div class="item" data-key="barrier_free">배리어프리</div></li>
                    <li><div class="item" data-key="ramp">경사로</div></li>
                    <li><div class="item" data-key="braille">점자</div></li>
                    <li><div class="item" data-key="stroller">유모차</div></li>
                    <li><div class="item" data-key="nursing_room">수유실</div></li>
                    <li><div class="item" data-key="kids_zone">키즈존</div></li>
                    <li><div class="item" data-key="wheelchair">휠체어</div></li>
                    <li><div class="item" data-key="disabled">장애인</div></li>
                    <li><div class="item" data-key="restroom">화장실</div></li>
                    <li><div class="item" data-key="seating">좌석</div></li>
                    <li><div class="item" data-key="elevator">엘리베이터</div></li>
                    <!--esg-->
                    <li><div class="item" data-key="animal_welfare">동물 복지 인증</div></li>
                    <li><div class="item" data-key="gluten_free">글루텐프리(밀가루사용X)</div></li>
                    <li><div class="item" data-key="sprouted">곡물사용</div></li><!--발아곡물-->
                    <li><div class="item" data-key="vegan">비건</div></li>
                    <li><div class="item" data-key="low_sugar">저당</div></li>
                    <li><div class="item" data-key="sugar_free">무설탕</div></li>
                    <li><div class="item" data-key="natural_fermentation">천연발효</div></li>
                    <li><div class="item" data-key="preservative_free">무방부제</div></li>
                </div>

                <div class="bottom">
                    <button class="btn primary" onclick="goNext()">선택완료</button>
                    <button class="btn secondary" onclick="location.href='index.html'">메인으로 돌아가기</button>
                </div>
            </div>

        </div>

        <script>
        let selected = {};

        document.querySelectorAll(".item").forEach(el => {
            el.onclick = () => {
                el.classList.toggle("active");
                const key = el.dataset.key;
                selected[key] = selected[key] ? 0 : 1;
            };
        });

        function goNext() {
            localStorage.setItem("filters", JSON.stringify(selected));
            location.href = "cont2_1.html";
        }
        </script>

    </body>
</html>
