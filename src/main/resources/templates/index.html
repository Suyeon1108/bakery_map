    <!-- 카카오 지도 API -->

</head>

<body>

<!-- 헤더 -->

    <div class="logo"></div>

<!-- 메인 영역 -->
<div class="container">

    <!-- 지도 -->
    <div id="map"></div>

    <!-- 리스트 -->
    <div class="store-list">

        <div class="card">
            <h3>성심당</h3>
            <p>⭐ ESG 4.8 / UD 4.5</p>
            <p>📍 대전 중구</p>
        </div>

        <div class="card">
            <h3>하레하레</h3>
            <p>⭐ ESG 4.2 / UD 3.9</p>
            <p>📍 대전 서구</p>
        </div>

    </div>

</div>

<!-- 지도 스크립트 -->
<script>
    var container = document.getElementById('map');
    var options = {
        center: new kakao.maps.LatLng(36.3504, 127.3845), // 대전 중심
        level: 5
    };

    var map = new kakao.maps.Map(container, options);

    // 마커 예시
    var markerPosition = new kakao.maps.LatLng(36.3504, 127.3845);
    var marker = new kakao.maps.Marker({
        position: markerPosition
    });

    marker.setMap(map);
</script>
